<div class="dashboard-page">
  <div class="dashboard-header">
    <h1 class="dashboard-title">Dashboard de Resultados</h1>
    <p class="dashboard-subtitle">Análisis del impacto de la IA en hábitos de estudio</p>
  </div>

  <div *ngIf="cargando()" class="dashboard-status">
    Cargando resultados...
  </div>

  <div *ngIf="!cargando() && error()" class="dashboard-status dashboard-status-error">
    {{ error() }}
  </div>

  <ng-container *ngIf="!cargando() && !error()">
    <div class="dashboard-stat">
      <span class="stat-value">{{ totalRespuestas() }}</span>
      <span class="stat-label">estudiantes han respondido la encuesta</span>
    </div>

    <div *ngIf="totalRespuestas() === 0" class="dashboard-status">
      Todavía no hay respuestas registradas. Vuelve pronto para ver los resultados.
    </div>

    <div *ngFor="let seccion of secciones()" class="dashboard-section">
      <div class="section-divider">
        <h2>{{ seccion.titulo }}</h2>
      </div>

      <div class="dashboard-grid">
        <section class="dashboard-card" *ngFor="let tarjeta of seccion.tarjetas">
          <div class="card-header">
            <h3>{{ tarjeta.titulo }}</h3>
          </div>
          <div class="chart-container" [style.height.px]="tarjeta.alto">
            <canvas baseChart
              [type]="tarjeta.tipo"
              [data]="tarjeta.data"
              [options]="tarjeta.options">
            </canvas>
          </div>
        </section>
      </div>
    </div>
  </ng-container>
</div>
